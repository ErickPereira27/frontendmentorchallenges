<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');

        body {
            font-family: 'poppins';
            background-color: hsl(217, 54%, 11%);
        }

        .card {
            background-color: hsl(216, 50%, 16%);
            width: 300px;
            height: 590px;
            margin: auto;
            margin-top: 10%;
            box-shadow: 0px 0px 50px rgba(0, 0, 0, 0.412);
            border-radius: 15px;
            padding: 20px;
        }

        .imgr {
            position: relative;
            top: 0;
            left: 0;
            width: 300px;
            height: 300px;
            border-radius: 10px;
            background-color: hsl(178, 100%, 50%);

            .img1 {
                width: 300px;
                border-radius: 10px;
                display: block;
                position: relative;
                top: 0;
                left: 0;
            }

            .img2 {
                position: absolute;
                top: 0px;
                left: 0px;
                width: 100%;
                height: 100%;
                border-radius: 10px;
                background-color: hsla(178, 100%, 50%,);
                background: rgba(0,0,0,0.0);
            }

            .img3 {
                position: absolute;
                top: 120px;
                left: 120px;
                opacity: 0;
            }

            .img2:hover{
                    background: hsl(178, 100%, 50%, 0.300);;

                    .img3 {
                        opacity: 1;
                    }
                }

        }

         


        .title {
            font-size: 1.7em;
            color: white;

            &:hover {
                color: hsl(178, 100%, 50%);
                transition: 0.7s;
            }
        }

        p {
            font-size: 18px;
        }



        .pr,
        .time2 {
            color: hsl(215, 51%, 70%);
        }

        .eth,
        .time {
            display: inline-flex;
            align-items: center;
            margin: 10px;
        }

        .eth2,
        .time2 {
            margin: 10px;
        }

        .time {
            float: right;
        }

        .eth2 {
            color: hsl(178, 100%, 50%);
        }


        hr {
            margin-top: 10px;
            border: none;
            height: 2px;
            background-color: hsl(215, 32%, 27%);
        }

        .avatar {
            display: inline-flex;
            align-items: center;
        }

        .avatar2 {
            border: 1px solid white;
            margin: 10px;
            margin-right: 15px;
            border-radius: 100%;
        }

        a {
            text-decoration: none;
            color: white;

            &:hover {
                color: hsl(178, 100%, 50%);
                transition: 0.7s;
            }
        }
    </style>
    <link rel="shortcut icon" href="images/favicon-32x32.png" type="image/x-icon">
    <title>nft card</title>
</head>

<body>

    <div class="card">
        <div class="imgr">

            <img src="images/image-equilibrium.jpg" alt="" class="img1">

            <div class="img2"><img src="images/icon-view.svg" alt="" class="img3"></div>
            

        </div>



        <h1 class="title">Equilibriun #3429</h1>

        <p class="pr">Our Equilibriun collection promotes balance and calm.</p>



        <span class="eth">
            <img src="images/icon-ethereum.svg" alt="">

            <span" class="eth2">0.041 ETH
        </span>
        </span>

        <span class="time">
            <img src="images/icon-clock.svg" alt="">

            <span class="time2">3 days left</span>
        </span>



        <hr>

        <span class="avatar">
            <img src="images/image-avatar.png" alt="" width="30px" class="avatar2">
            <span class="pr">Creation of <a href="">Jules Wyvern</a></span>
        </span>



    </div>

</body>

</html>
